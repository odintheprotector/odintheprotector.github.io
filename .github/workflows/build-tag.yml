name: Build and Deploy Tag

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0, v2.1, etc.

jobs:
  build:
    runs-on: ubuntu-24.04-x64  # Self-hosted runner with Ubuntu 24.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Ruby
      run: |
        # Install ruby-build and required dependencies
        sudo apt-get update
        sudo apt-get install -y build-essential libssl-dev libreadline-dev zlib1g-dev
        git clone https://github.com/rbenv/ruby-build.git /tmp/ruby-build
        export PATH="/tmp/ruby-build/bin:$PATH"
        
        # Install Ruby version 3.1.4
        ruby-build 3.1.4 /opt/hostedtoolcache/Ruby/3.1.4/x64

        # Mark Ruby installation as complete
        touch /opt/hostedtoolcache/Ruby/3.1.4/x64.complete
        
    - name: Set up Bundler
      run: gem install bundler

    - name: Install dependencies
      run: |
        bundle install --jobs 4 --retry 3

    - name: Run tests
      run: bundle exec rspec

    # Additional deployment steps (if any)
