name: Build branch

on:
  push:
    branches-ignore:
      - 1.*
      - main
    tags-ignore:
      - v1.*
      - v2.*

jobs:
  build-branch:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby-version: ['2.6', '2.7', '3.0']

    steps:
    - uses: actions/checkout@v2
    - name: 💎 Set up Ruby
      uses: ruby/setup-ruby@v1  # Use the latest stable version instead of a specific commit
      with:
        ruby-version: ${{ matrix.ruby-version }}
        bundler-cache: true
    - name: 🧪 Run tests
      run: bundle exec rake
