name: Build Tag

on:
  push:
    branches:
      - main
      - 1.*

jobs:
  build-tag:
    runs-on: ubuntu-latest
    steps:
      - name: 🎒 Checkout repository
        uses: actions/checkout@v3  # Updated to the latest version

      - name: 💎 Extract gemspec info
        id: gemspec_fetch
        uses: bitbrain/gemspec-fetch@1.1.0  # Update to the latest version (if available)
        with:
          specfile: jekyll-dash.gemspec

      - name: 🕵️‍♂️ Investigate if tag exists
        uses: mukunku/tag-exists-action@v2  # Update to the latest version
        id: tag-check
        with:
          tag: 'v${{ steps.gemspec_fetch.outputs.version }}'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔖 Build tag
        if: ${{ steps.tag-check.outputs.exists == 'false' }}
        id: tag_version
        uses: mathieudutour/github-tag-action@v6  # Update to the latest version
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: false
          custom_tag:  ${{ steps.gemspec_fetch.outputs.version }}
          tag_prefix: v

      - name: 📙 GitHub release
        if: ${{ steps.tag-check.outputs.exists == 'false' }}
        uses: ncipollo/release-action@v1.14.0  # Update to the latest version
        with:
          tag: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}

      # New way of setting outputs (replaces deprecated set-output command)
      - name: Set output version
        run: echo "NEW_TAG=${{ steps.tag_version.outputs.new_tag }}" >> $GITHUB_ENV  # Fix for set-output deprecation
